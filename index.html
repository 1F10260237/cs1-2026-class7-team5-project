<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-title">カービィ(switch編)</div>

            <div class="sidebar-btn-column">
                <button class="sidebar-btn active" id="top-btn" onclick="openSection('top',this)">
                    <span class="material-symbols-outlined">
                        home
                    </span>
                    トップ
                </button>
                <button class="sidebar-btn" id="detail-btn" onclick="openSection('detail',this)">
                    <span class="material-symbols-outlined">
                        info
                    </span>
                    カービィってなに？
                </button>
                <button class="sidebar-btn" onclick="toggleAccordion()">
                    <span id="accordion-icon" class="material-symbols-outlined">
                        chevron_right
                    </span>
                    作品一覧
                </button>

                <div class="accordion-menu" id="accordion-menu">

                    <button class="accordion-item" onclick="openSection('discovery',this)">星のカービィ ディスカバリー</button>
                    <button class="accordion-item" onclick="openSection('airrider',this)">カービィのエアライダー</button>
                    <button class="accordion-item" onclick="openSection('wii-deluxe',this)">星のカービィ Wii デラックス</button>
                    <button class="accordion-item" onclick="openSection('star-arise',this)">星のカービィ スターアライズ</button>
                    <button class="accordion-item" onclick="openSection('fighters2',this)">カービィ ファイターズ2</button>
                    <button class="accordion-item" onclick="openSection('gourmet-fes',this)">カービィのグルメフェス</button>
                    <button class="accordion-item" onclick="openSection('hunters',this)">スーパーカービィハンターズ</button>

                </div>

            </div>
        </aside>

        <main class="main">
            <section class="page open" id="top">
                <h1>トップ</h1>
            </section>

            <section class="page" id="detail">
                <h1>カービィってなに？</h1>
            </section>

            <section class="page" id="discovery">
                <h1>星のカービィ ディスカバリー</h1>
            </section>

            <section class="page" id="airrider">
                <h1>カービィのエアライダー</h1>
            </section>

            <section class="page" id="wii-deluxe">
                <h1>星のカービィ Wii デラックス</h1>
            </section>

            <section class="page" id="star-arise">
                <h1>星のカービィ スターアライズ</h1>
            </section>

            <section class="page" id="fighters2">
                <h1>カービィ ファイターズ2</h1>
            </section>

            <section class="page" id="gourmet-fes">
                <h1>カービィのグルメフェス</h1>
            </section>

            <section class="page" id="hunters">
                <h1>スーパーカービィハンターズ</h1>
            </section>

        </main>

        <script src="script.js"></script>
    </div>
</body>
</html>
