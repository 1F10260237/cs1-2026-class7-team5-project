<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-title">カービィ(switch編)</div>

            <div class="sidebar-btn-column">
                <button class="sidebar-btn active" id="top-btn" onclick="openSection('top',this)">
                    <span class="material-symbols-outlined">
                        home
                    </span>
                    トップ
                </button>
                <button class="sidebar-btn" id="detail-btn" onclick="openSection('detail',this)">
                    <span class="material-symbols-outlined">
                        info
                    </span>
                    カービィってなに？
                </button>
                <button class="sidebar-btn" onclick="toggleAccordion()">
                    <span class="material-symbols-outlined">
                        expand_more
                    </span>
                    作品一覧
                </button>

                <div class="accordion-menu" id="accordion-menu">

                    <button class="accordion-item">星のカービィ ディスカバリー</button>
                    <button class="accordion-item">カービィのエアライダー</button>
                    <button class="accordion-item">星のカービィ Wii デラックス</button>
                    <button class="accordion-item">星のカービィ スターアライズ</button>
                    <button class="accordion-item">カービィ ファイターズ2</button>
                    <button class="accordion-item">カービィのグルメフェス</button>
                    <button class="accordion-item">スーパーカービィハンターズ</button>
                    <button class="accordion-item">カービィ ファイターズ2</button>

                </div>

            </div>
        </aside>

        <main class="main">
            <section class="page open" id="top">
                <h1>トップ</h1>
            </section>

            <section class="page" id="detail">
                <h1>カービィってなに？</h1>
            </section>
        </main>

        <script src="script.js"></script>
    </div>
</body>
</html>
