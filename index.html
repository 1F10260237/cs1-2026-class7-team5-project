<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-title">今から始める <br> 星のカービィ</div>

            <div class="sidebar-btn-column">

                <button class="sidebar-btn active" id="top-btn" onclick="openSection('top',this)">
                    <span class="material-symbols-outlined">
                        home
                    </span>
                    トップ
                </button>

                <button class="sidebar-btn" id="detail-btn" onclick="openSection('detail',this)">
                    <span class="material-symbols-outlined">
                        info
                    </span>
                    カービィってなに？
                </button>

                <button class="sidebar-btn" onclick="openSection('list',this)">
                    <span class="material-symbols-outlined">
                        menu_book
                    </span>
                    作品一覧
                </button>

                <button class="sidebar-btn" onclick="window.open('movie.html','_blank')">
                    <span class="material-symbols-outlined">
                        tv
                    </span>
                    配信
                </button>

            </div>
        </aside>

        <main class="main">
            <section class="page open" id="top">
                <h1>トップ</h1>
            </section>

            <section class="page" id="detail">
                <h1>カービィってなに？</h1>
            </section>

            <section class="page" id="list">
                <h1>作品一覧</h1>
            </section>

        </main>

        <script src="script.js"></script>
    </div>
</body>
</html>
