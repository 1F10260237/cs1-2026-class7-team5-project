<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>カービィ紹介サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-title">今から始める <br> 星のカービィ</div>

            <div class="sidebar-btn-column">

                <button class="sidebar-btn active" id="top-btn" onclick="openSection('top',this)">
                    <span class="material-symbols-outlined">
                        home
                    </span>
                    トップ
                </button>

                <button class="sidebar-btn" id="detail-btn" onclick="openSection('detail',this)">
                    <span class="material-symbols-outlined">
                        info
                    </span>
                    カービィってなに？
                </button>

                <button class="sidebar-btn" onclick="openAccordionMenu(this)">
                    <span class="material-symbols-outlined arrow">
                        chevron_forward
                    </span>
                    作品一覧
                </button>

                <div class="accordion-menu">
                    <button class="accordion-item" onclick="openSection('star-arise',this)">星のカービィ スターアライズ</button>
                    <button class="accordion-item" onclick="openSection('hunters',this)">スーパーカービィ ハンターズ</button>
                    <button class="accordion-item" onclick="openSection('fighters2',this)">カービィ ファイターズ２</button>
                    <button class="accordion-item" onclick="openSection('discovery',this)">星のカービィ ディスカバリー</button>
                    <button class="accordion-item" onclick="openSection('gourmet',this)">カービィのグルメフェス</button>
                    <button class="accordion-item" onclick="openSection('deluxe',this)">星のカービィ Wiiデラックス</button>
                    <button class="accordion-item" onclick="openSection('air-rider',this)">カービィのエアライダー</button>
                </div>

                <button class="sidebar-btn" onclick="window.open('movie.html','_blank')">
                    <span class="material-symbols-outlined">
                        tv
                    </span>
                    配信
                </button>

            </div>
        </aside>

        <main class="main">
            <section class="page open" id="top">
                <h1 class="title">閲覧いただきありがとうございます！</h1>
                <div>このサイトでは、Nintendo Switchで遊べるカービィの作品や、</div>
                <div>カービィというキャラクターの魅力についてご紹介しています。</div>
                <div>カービィの世界をもっと知りたい方は、ぜひ他のページもご覧ください！</div>

                <div class="section-title">
                    <div class="line"></div>

                    <h2>
                        <i class="fa-solid fa-star"></i>
                            このサイトで紹介していること
                        <i class="fa-solid fa-star"></i>
                    </h2>

                    <div class="line"></div>
                </div>

                <div class="infomation">

                    <div class="card">
                    </div>

                </div>
            </section>

            <section class="page" id="detail">
                <h1>カービィってなに？</h1>
            </section>

            <section class="page" id="star-arise">
                <h1>星のカービィ スターアライズ</h1>
            </section>

            <section class="page" id="hunters">
                <h1>スーパーカービィ ハンターズ</h1>
            </section>

            <section class="page" id="fighters2">
                <h1>カービィ ファイターズ２</h1>
            </section>

            <section class="page" id="discovery">
                <h1>星のカービィ ディスカバリー</h1>
            </section>

            <section class="page" id="gourmet">
                <h1>カービィのグルメフェス</h1>
            </section>

            <section class="page" id="deluxe">
                <h1>星のカービィ Wiiデラックス</h1>
            </section>

            <section class="page" id="air-rider">
                <h1>カービィのエアライダー</h1>
            </section>



        </main>

        <script src="script.js"></script>
    </div>
</body>
</html>
